<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="dashboard.js"></script>
</head>

<body>

<div class="bg-animation"></div>

<div class="dashboard">

<!-- Sidebar -->

<div class="sidebar">

<h2>🚧 PCS</h2>

<ul>
<li class="active">🏠 Dashboard</li>
<li>📸 Submit</li>
<li>📊 My Complaints</li>
<li>👤 Profile</li>
<li onclick="logout()">🚪 Logout</li>
</ul>

</div>

<!-- Main -->

<div class="main">

<h1 class="title">Welcome Back 👋</h1>

<div class="cards">

<div class="card">
<h3>Total Complaints</h3>
<p>25</p>
</div>

<div class="card">
<h3>Resolved</h3>
<p>18</p>
</div>

<div class="card">
<h3>Pending</h3>
<p>7</p>
</div>

</div>

<div class="recent">

<h2>Recent Complaints</h2>

<div class="complaint">🚧 Road Damage - Pending</div>
<div class="complaint">💡 Street Light - Resolved</div>
<div class="complaint">🗑 Garbage - In Progress</div>

</div>

</div>

</div>

<script>
function logout(){
window.location.href="index.html";
}
</script>

</body>
</html>
